<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IEMELIF 98th Anniversary Songbook</title>
<link rel="stylesheet" href="css/style.css">
<style>

body{
  background-image: url("images/churchmpic.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;
}

.hero {
  text-align:center;
  padding: 50px 20px 30px;
}
.anniversary-badge {
  display:inline-block;
  padding: 8px 24px;
  background: linear-gradient(135deg, rgba(212,160,23,0.25), rgba(240,192,64,0.15));
  border: 1px solid rgba(212,160,23,0.5);
  border-radius: 50px;
  font-family:'Cinzel',serif; font-size:0.78rem; letter-spacing:0.15em;
  color: var(--gold-shine);
  margin-bottom:20px;
  text-transform:uppercase;
}
.church-name {
  font-family:'Cinzel',serif;
  font-size:clamp(1rem,2.5vw,1.3rem);
  color:rgba(255,255,255,0.7);
  letter-spacing:0.1em;
  margin-bottom:10px;
  text-transform:uppercase;
}
.hero h1 {
  font-family:'Playfair Display',serif;
  font-size:clamp(2rem,6vw,4rem);
  font-weight:900; font-style:italic;
  background: linear-gradient(135deg, var(--gold-shine) 0%, #fff 40%, var(--pink-light) 70%, var(--gold-light) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
  line-height:1.15; margin-bottom:16px;
}
.hero-sub {
  font-family:'Cormorant Garamond',serif; font-style:italic;
  font-size:clamp(1rem,2vw,1.3rem);
  color:rgba(255,255,255,0.72);
  letter-spacing:0.04em;
  max-width:560px; margin:0 auto 36px;
  line-height:1.6;
}
.hero-actions {
  display:flex; gap:14px; justify-content:center; flex-wrap:wrap;
  margin-top:10px;
}

.section-title {
  font-family:'Cinzel',serif; font-size:1.1rem; letter-spacing:0.12em;
  color:var(--gold-light);
  text-align:center; margin:50px 0 24px;
  display:flex; align-items:center; justify-content:center; gap:16px;
}
.section-title::before,.section-title::after {
  content:'';width:60px;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold-mid));
}
.section-title::after { background:linear-gradient(90deg,var(--gold-mid),transparent); }

.song-list {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(280px,1fr));
  gap:20px;
  max-width:1100px; margin:0 auto;
  padding:0 20px;
}
.song-card {
  padding: 28px 24px;
  text-decoration:none; color:white;
  display:block;
  border-left: 3px solid transparent;
  background: rgba(255,255,255,0.12);
  backdrop-filter:blur(18px);
  border: 1px solid rgba(255,255,255,0.22);
  border-radius:16px;
  transition: all 0.35s ease;
  position:relative; overflow:hidden;
}
.song-card::before {
  content:'';
  position:absolute; inset:0;
  background:linear-gradient(135deg,rgba(212,160,23,0.08),rgba(194,24,91,0.08));
  opacity:0; transition:opacity 0.35s ease;
}
.song-card:hover::before { opacity:1; }
.song-card:hover {
  transform:translateY(-6px);
  border-color:rgba(212,160,23,0.45);
  box-shadow:0 16px 50px rgba(194,24,91,0.2), 0 4px 20px rgba(212,160,23,0.3);
}
.song-number {
  font-family:'Cinzel',serif; font-size:0.72rem; letter-spacing:0.14em;
  color:var(--gold-mid); margin-bottom:8px;
}
.song-title-card {
  font-family:'Playfair Display',serif; font-size:1.35rem; font-weight:700;
  color:white; margin-bottom:6px; line-height:1.2;
}
.song-author-card {
  font-family:'Cormorant Garamond',serif; font-style:italic;
  font-size:0.95rem; color:rgba(255,255,255,0.65);
}
.song-card-footer {
  display:flex; align-items:center; justify-content:space-between;
  margin-top:14px; padding-top:14px;
  border-top:1px solid rgba(255,255,255,0.15);
}
.song-tempo {
  font-size:0.8rem; color:rgba(255,255,255,0.55);
  font-family:'Lato',sans-serif;
}
.song-arrow {
  width:28px;height:28px;
  background:rgba(212,160,23,0.2);
  border:1px solid rgba(212,160,23,0.35);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:0.75rem; color:var(--gold-light);
  transition:all 0.3s ease;
}
.song-card:hover .song-arrow {
  background:rgba(212,160,23,0.4);
  transform:translateX(3px);
}

.quick-actions {
  display:flex; gap:16px; justify-content:center; flex-wrap:wrap;
  padding:40px 20px;
}
.action-card {
  flex:1; min-width:220px; max-width:320px;
  padding:32px 24px; text-align:center;
  text-decoration:none; color:white;
  background:rgba(255,255,255,0.11);
  border:1px solid rgba(255,255,255,0.22);
  border-radius:18px; backdrop-filter:blur(18px);
  transition:all 0.35s ease;
}
.action-card:hover {
  transform:translateY(-6px);
  box-shadow:0 16px 40px var(--shadow-rose);
}
.action-icon {
  font-size:2.5rem; margin-bottom:14px;
  display:block;
  filter:drop-shadow(0 4px 8px rgba(212,160,23,0.4));
}
.action-card h3 {
  font-family:'Cinzel',serif; font-size:1rem; letter-spacing:0.08em;
  color:var(--gold-shine); margin-bottom:8px;
}
.action-card p {
  font-family:'Cormorant Garamond',serif; font-style:italic;
  font-size:0.95rem; color:rgba(255,255,255,0.65);
  line-height:1.5;
}
.action-book { border-color:rgba(212,160,23,0.35); }
.action-book:hover { border-color:rgba(212,160,23,0.7); }
.action-admin { border-color:rgba(194,24,91,0.35); }
.action-admin:hover { border-color:rgba(194,24,91,0.7); }
</style>
</head>
<body>

<div class="bg-shapes">
  <div class="shape"></div><div class="shape"></div>
  <div class="shape"></div><div class="shape"></div><div class="shape"></div>
</div>

<header>
  <div class="container">
    <nav class="glass">
      <a class="logo" href="index.html">
        <span class="logo-cross">✞</span>
        <span>IEMELIF Songbook</span>
      </a>
      <div class="nav-links">
        <a href="index.html" class="active">Home</a>
        <a href="book.html">Book Mode</a>
        <a href="admin.html">⚙ Admin</a>
      </div>
    </nav>
  </div>
</header>

<main>
  <!-- HERO -->
  <section class="hero">
    <div class="anniversary-badge">✦ 98th Anniversary ✦</div>
    <p class="church-name">Mahabang Parang IEMELIF Church</p>
    <h1>Prayer & Praise<br>Songbook</h1>
    <div class="hero-actions">
      <a href="book.html" class="btn btn-gold">Open Book Mode</a>
      <a href="admin.html" class="btn btn-glass">Admin Panel</a>
    </div>
  </section>

  <!-- SONG LIST -->
  <h2 class="section-title">Songs</h2>
  <div class="song-list" id="songList">
    <!-- rendered by JS -->
    <div style="text-align:center;color:rgba(255,255,255,0.5);padding:40px;grid-column:1/-1;">
      Loading songs...
    </div>
  </div>
</main>

<footer>
  &copy; 2025 <span>Mahabang Parang IEMELIF Church</span> — 98th Anniversary ✦ All glory to God
</footer>

<script src="js/utils.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const songs = loadSongs();
  const list = document.getElementById('songList');
  
  if (!songs.length) {
    list.innerHTML = '<p style="color:rgba(255,255,255,0.5);text-align:center;grid-column:1/-1;">No songs yet. Ask the admin to add songs.</p>';
    return;
  }

  list.innerHTML = songs.map((song, i) => `
    <a href="song.html?id=${song.id}" class="song-card">
      <div class="song-number">Song ${String(i+1).padStart(2,'0')}</div>
      <div class="song-title-card">${song.title}</div>
      <div class="song-author-card">${song.author || ''}</div>
      <div class="song-card-footer">
        <span class="song-tempo">${song.timeSignature || ''} ${song.tempo || ''}</span>
        <span class="song-arrow">→</span>
      </div>
    </a>
  `).join('');

  // Sparkle particles
  for(let i=0;i<18;i++){
    const p=document.createElement('div');
    p.className='particle';
    p.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*4}s;animation-duration:${3+Math.random()*3}s;`;
    document.querySelector('.bg-shapes').appendChild(p);
  }
});
</script>
</body>
</html>
