<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Song — IEMELIF Songbook</title>
<link rel="stylesheet" href="css/style.css">
<style>
/* ── SONG PAGE SPECIFIC ─────────────────────────────── */
.song-page-header {
  max-width:860px; margin:30px auto 0;
  padding:0 20px;
}
.back-link {
  display:inline-flex; align-items:center; gap:6px;
  font-family:'Cinzel',serif; font-size:0.75rem; letter-spacing:0.1em;
  color:rgba(255,255,255,0.65);
  text-decoration:none; padding:8px 0;
  transition:color 0.3s ease;
}
.back-link:hover { color:var(--gold-shine); }

.song-header {
  max-width:860px; margin:16px auto;
  padding:32px 36px;
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(212,160,23,0.30);
  border-radius:20px;
  backdrop-filter:blur(20px);
}
.song-meta-top {
  display:flex; justify-content:space-between; align-items:flex-start;
  flex-wrap:wrap; gap:12px; margin-bottom:20px;
}
.song-number-big {
  font-family:'Cinzel',serif; font-size:0.72rem; letter-spacing:0.18em;
  color:var(--gold-mid); text-transform:uppercase;
}
.song-title-big {
  font-family:'Playfair Display',serif;
  font-size:clamp(1.8rem,5vw,2.8rem);
  font-weight:900; font-style:italic;
  background:linear-gradient(135deg, var(--gold-shine), #fff, var(--pink-light));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text; line-height:1.1;
  margin:6px 0 8px;
}
.song-author-big {
  font-family:'Cormorant Garamond',serif; font-style:italic;
  font-size:1.1rem; color:rgba(255,255,255,0.65);
}
.song-info-chips {
  display:flex; gap:8px; flex-wrap:wrap; margin-top:12px;
}
.chip {
  font-family:'Lato',sans-serif; font-size:0.75rem;
  padding:5px 14px;
  border-radius:30px;
  background:rgba(255,255,255,0.10);
  border:1px solid rgba(255,255,255,0.20);
  color:rgba(255,255,255,0.75);
}
.chip.key { border-color:rgba(212,160,23,0.4); color:var(--gold-shine); }

/* ── Transpose Controls ─────────────────────────────── */
.transpose-bar {
  max-width:860px; margin:16px auto;
  padding:0 20px;
}
.transpose-panel {
  padding:18px 24px;
  display:flex; align-items:center; gap:16px; flex-wrap:wrap;
  justify-content:space-between;
  background:rgba(255,255,255,0.10);
  border:1px solid rgba(212,160,23,0.25);
  border-radius:14px; backdrop-filter:blur(16px);
}
.transpose-label {
  font-family:'Cinzel',serif; font-size:0.78rem; letter-spacing:0.1em;
  color:var(--gold-mid);
}
.transpose-controls {
  display:flex; align-items:center; gap:10px;
}
.t-btn {
  width:36px;height:36px;
  border-radius:50%; border:1px solid rgba(212,160,23,0.45);
  background:rgba(212,160,23,0.18); color:var(--gold-shine);
  cursor:pointer; font-size:1.1rem; font-weight:bold;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.25s ease; font-family:inherit;
}
.t-btn:hover { background:rgba(212,160,23,0.35); transform:scale(1.1); }
.semitone-display {
  font-family:'Cinzel',serif; font-size:1rem;
  color:white; min-width:60px; text-align:center;
}
.semitone-display span { color:var(--gold-shine); font-size:1.2rem; }
.key-display {
  font-family:'Cormorant Garamond',serif; font-size:0.95rem;
  color:rgba(255,255,255,0.65); font-style:italic;
}
.key-display strong { color:var(--gold-shine); font-style:normal; }
.t-reset {
  padding:7px 18px;
  border-radius:30px; border:1px solid rgba(255,255,255,0.25);
  background:rgba(255,255,255,0.10); color:rgba(255,255,255,0.75);
  cursor:pointer; font-size:0.75rem; font-family:'Cinzel',serif;
  letter-spacing:0.08em; transition:all 0.25s ease;
}
.t-reset:hover { background:rgba(255,255,255,0.20); color:white; }

/* ── Song Body ──────────────────────────────────────── */
.song-body {
  max-width:860px; margin:16px auto 40px;
  padding:0 20px;
}
.song-content-card {
  padding:36px 40px;
  background:rgba(255,255,255,0.10);
  border:1px solid rgba(255,255,255,0.18);
  border-radius:20px; backdrop-filter:blur(20px);
  font-family:'Cormorant Garamond',serif;
}
.verse-block {
  margin-bottom:30px;
}
.verse-block:last-child { margin-bottom:0; }
.verse-label {
  font-family:'Cinzel',serif; font-size:0.7rem; letter-spacing:0.16em;
  color:var(--gold-mid); text-transform:uppercase;
  margin-bottom:12px; padding-bottom:6px;
  border-bottom:1px solid rgba(212,160,23,0.25);
}
.song-line {
  margin-bottom:2px; line-height:1;
}
.chord-row {
  font-family:'Lato',sans-serif; font-size:0.88rem; font-weight:700;
  color:var(--gold-shine);
  letter-spacing:0.03em;
  white-space:pre; overflow-x:auto;
  min-height:20px; padding:2px 0;
}
.lyric-row {
  font-family:'Cormorant Garamond',serif; font-size:1.15rem;
  color:rgba(255,255,255,0.90);
  white-space:pre-wrap; padding:2px 0;
  line-height:1.4; margin-bottom:6px;
}

/* Navigation between songs */
.song-nav {
  max-width:860px; margin:0 auto 40px;
  padding:0 20px;
  display:flex; justify-content:space-between; gap:12px;
}
.song-nav a {
  flex:1; padding:14px 20px; text-align:center;
  text-decoration:none; color:rgba(255,255,255,0.8);
  background:rgba(255,255,255,0.09);
  border:1px solid rgba(255,255,255,0.18);
  border-radius:12px; backdrop-filter:blur(14px);
  font-family:'Cormorant Garamond',serif; font-size:1rem; font-style:italic;
  transition:all 0.3s ease;
}
.song-nav a:hover { background:rgba(212,160,23,0.18); border-color:rgba(212,160,23,0.4); color:var(--gold-shine); }
.song-nav a.disabled { opacity:0.3; pointer-events:none; }

@media(max-width:600px){
  .song-content-card { padding:24px 20px; }
  .chord-row { font-size:0.78rem; }
  .lyric-row { font-size:1rem; }
  .song-header { padding:24px 20px; }
  .transpose-panel { gap:12px; }
}
</style>
</head>
<body>

<div class="bg-shapes">
  <div class="shape"></div><div class="shape"></div>
  <div class="shape"></div><div class="shape"></div>
</div>

<header>
  <div class="container">
    <nav class="glass">
      <a class="logo" href="index.html">
        <span class="logo-cross">✞</span>
        <span>IEMELIF Songbook</span>
      </a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="book.html">📖 Book Mode</a>
        <a href="admin.html">⚙ Admin</a>
      </div>
    </nav>
  </div>
</header>

<main>
  <div class="song-page-header">
    <a class="back-link" href="index.html">← Back to Song List</a>
  </div>

  <!-- Song Header -->
  <div class="song-header glass" id="songHeader" style="max-width:860px;margin:16px auto;">
    <div style="text-align:center;color:rgba(255,255,255,0.5);padding:20px;">Loading...</div>
  </div>

  <!-- Transpose Bar -->
  <div class="transpose-bar">
    <div class="transpose-panel" id="transposePanel">
      <span class="transpose-label">🎵 Transpose</span>
      <div class="transpose-controls">
        <button class="t-btn" id="tDown">♭</button>
        <div class="semitone-display" id="semitoneDisplay"><span>0</span></div>
        <button class="t-btn" id="tUp">♯</button>
      </div>
      <div class="key-display" id="keyDisplay">Key: <strong>—</strong></div>
      <button class="t-reset" id="tReset">Reset</button>
    </div>
  </div>

  <!-- Song Content -->
  <div class="song-body">
    <div class="song-content-card" id="songContent">
      <div style="text-align:center;color:rgba(255,255,255,0.5);padding:40px;">Loading song...</div>
    </div>
  </div>

  <!-- Prev / Next -->
  <div class="song-nav" id="songNav"></div>
</main>

<footer>
  &copy; 2025 <span>Mahabang Parang IEMELIF Church</span> — 98th Anniversary ✦ All glory to God
</footer>

<script src="js/utils.js"></script>
<script>
let currentSong = null;
let allSongs = [];
let semitones = 0;

function getSongIdFromURL() {
  const params = new URLSearchParams(window.location.search);
  return parseInt(params.get('id') || '1', 10);
}

function detectBaseKey(song) {
  if (!song.verses || !song.verses[0]) return 'G';
  const firstChordLine = song.verses[0].lines.find(l => l.chord && l.chord.trim());
  if (!firstChordLine) return 'G';
  const match = firstChordLine.chord.match(/[A-G][#b]?/);
  return match ? match[0] : 'G';
}

function renderSong() {
  if (!currentSong) return;
  const baseKey = detectBaseKey(currentSong);

  // Header
  const songIdx = allSongs.findIndex(s => s.id === currentSong.id);
  document.getElementById('songHeader').innerHTML = `
    <div class="song-meta-top">
      <div>
        <div class="song-number-big">Song ${String(songIdx + 1).padStart(2,'0')} of ${allSongs.length}</div>
        <div class="song-title-big">${currentSong.title}</div>
        <div class="song-author-big">${currentSong.author || ''}</div>
      </div>
    </div>
    <div class="song-info-chips">
      <span class="chip key">🎼 Key: ${getTransposedKeyLabel(baseKey, semitones)}</span>
      ${currentSong.timeSignature ? `<span class="chip">${currentSong.timeSignature}</span>` : ''}
      ${currentSong.tempo ? `<span class="chip">♩ ${currentSong.tempo}</span>` : ''}
    </div>
  `;

  // Key display
  document.getElementById('keyDisplay').innerHTML = `Key: <strong>${getTransposedKeyLabel(baseKey, semitones)}</strong>`;
  document.getElementById('semitoneDisplay').innerHTML = `<span>${semitones >= 0 ? '+' : ''}${semitones}</span>`;

  // Content
  document.getElementById('songContent').innerHTML = renderSongContent(currentSong.verses, semitones);

  // Nav
  const idx = allSongs.findIndex(s => s.id === currentSong.id);
  const prev = allSongs[idx - 1];
  const next = allSongs[idx + 1];
  document.getElementById('songNav').innerHTML = `
    <a href="${prev ? 'song.html?id='+prev.id : '#'}" class="${!prev ? 'disabled' : ''}">
      ← ${prev ? prev.title : 'Start'}
    </a>
    <a href="${next ? 'song.html?id='+next.id : '#'}" class="${!next ? 'disabled' : ''}">
      ${next ? next.title : 'End'} →
    </a>
  `;

  document.title = `${currentSong.title} — IEMELIF Songbook`;
}

document.addEventListener('DOMContentLoaded', () => {
  allSongs = loadSongs();
  const id = getSongIdFromURL();
  currentSong = allSongs.find(s => s.id === id) || allSongs[0];

  document.getElementById('tUp').addEventListener('click', () => {
    semitones++;
    renderSong();
  });
  document.getElementById('tDown').addEventListener('click', () => {
    semitones--;
    renderSong();
  });
  document.getElementById('tReset').addEventListener('click', () => {
    semitones = 0;
    renderSong();
  });

  renderSong();
});
</script>
</body>
</html>
